<div class="modal-overlay" (click)="onOverlayClick($event)">
	<div class="modal-card" (click)="$event.stopPropagation()">
		<div class="modal-header">
			<h2>{{ modalTitle }}</h2>
			<button class="btn-close" type="button" (click)="closePopup()">x</button>
		</div>
		<form class="recipe-form" (ngSubmit)="saveRecipe()">
			<label class="form-group">
				<span>Recipe name</span>
				<input type="text" [formControl]="recipeNameControl" placeholder="Grandma's pasta">
				@if (recipeNameControl.touched && recipeNameControl.hasError('required')) {
					<p class="field-error">Recipe name is required.</p>
				} @else if (recipeNameControl.touched && recipeNameControl.hasError('minlength')) {
					<p class="field-error">Recipe name must be at least 3 characters.</p>
				}
			</label>
			<label class="form-group">
				<span>Description</span>
				<textarea [formControl]="recipeDescriptionControl" rows="4"
					placeholder="Describe the recipe"></textarea>
			</label>
			<label class="form-group">
				<span>Image URL</span>
				<input type="url" [formControl]="recipeImageControl" placeholder="https://example.com/image.jpg">
			</label>
			<div class="form-group meal-type-group">
				<span>Meal types</span>
				<mat-select class="meal-type-select" panelClass="meal-type-panel"
					[disableOptionCentering]="true" [formControl]="recipeMealTypesControl" multiple>
					@for (mealType of mealTypeOptions(); track mealType.value) {
						<mat-option [value]="mealType.value">{{ mealType.viewValue }}</mat-option>
					}
				</mat-select>
			</div>
			<div class="form-actions">
				<button class="btn-submit" type="submit" [disabled]="creating()">{{ submitButtonLabel }}</button>
				@if (isEditMode) {
					<button class="btn-delete" type="button" (click)="deleteRecipe()"
						[disabled]="creating()">
						Delete Recipe
					</button>
				}
			</div>
			@if (saveError()) {
				<p class="recipes-error modal-error">{{ saveError() }}</p>
			}
			<hr>
		</form>
	</div>
</div>

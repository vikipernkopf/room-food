<div>
	<span>Rooms I'm part of</span>

</div>

<div>
	<span>Rooms I own</span>
</div>


<button (click)="newRoom()" [disabled]="creating">{{ creating ? 'Creating...' : 'Create room' }}</button>

@if(createdRoomCode){
	<div>
		<p>Created room code: {{ createdRoomCode }}</p>
	</div>
}

@if(!currentUser()?.username){
	<div>
		<p>You must be logged in to create a room.</p>
	</div>
}

<div class="room-header">
	<h1>Rooms</h1>
	<button class="btn-join">Join Room</button>
</div>
<div class="room-containers">
	<button class="btn-add" (click)="openAddRoom()"> +
	</button>
</div>

@if(showAddRoom) {
	<div>
		<app-room-creation></app-room-creation>
	</div>
}

@if(!currentUser()?.username){
	<div>
		<p>You must be logged in to create a room.</p>
	</div>
}

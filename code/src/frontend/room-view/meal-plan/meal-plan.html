@if(meal) {
	<div class="meal-plan" [class.even]="index % 2 === 1">
		<h3>{{ meal.name }}</h3>
		<p><strong>Time:</strong> {{ meal.time | date:'short' }}</p>
		<p><strong>Room:</strong> {{ meal.room }}</p>
		<p><strong>Responsible:</strong> {{ meal.responsible }}</p>
		<div class="action-row">
			<button type="button" class="edit-btn" (click)="onEditClick()">Edit Meal</button>
			<button type="button" class="delete-btn" (click)="onDeleteClick()">Delete Meal</button>
		</div>
	</div>
} @else {
	<p>No meal data available</p>
}

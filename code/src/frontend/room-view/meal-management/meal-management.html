<section>
	<form class="meal-management-container" autocomplete="on">
		<div class="modal-header">
			<h2>{{ isEditMode ? 'Edit Meal' : 'Plan a Meal' }}</h2>
			<button class="btn-close" type="button" (click)="closePopup()">x</button>
		</div>

		<div class="form-grid">
			<div class="field-group field-group--full">
				<label class="field-label" for="dish">Dish</label>
				<input id="dish" matInput name="dish" placeholder="Pasta" [(ngModel)]="dish" (ngModelChange)="clearErrors()">
			</div>

			<div class="field-group field-group--full">
				<label class="field-label" for="mealType">Meal type</label>
				<mat-select id="mealType" [(ngModel)]="selectedValue" name="food" (ngModelChange)="clearErrors()">
					@for (type of mealTypes; track type) {
						<mat-option [value]="type.value">{{type.viewValue}}</mat-option>
					}
				</mat-select>
			</div>

			<div class="field-group field-group--full">
				<label class="field-label" for="mealDate">Date</label>
				<div class="input-with-icon">
					<input id="mealDate" matInput [matDatepicker]="datepicker" [(ngModel)]="selectedDate" name="date" (ngModelChange)="clearErrors()">
					<mat-datepicker-toggle matIconSuffix [for]="datepicker"></mat-datepicker-toggle>
					<mat-datepicker #datepicker></mat-datepicker>
				</div>
			</div>

			<div class="field-group">
				<label class="field-label" for="startTime">Start Time</label>
				<div class="input-with-icon">
					<input id="startTime" matInput
						   [matTimepicker]="startPicker"
						   [min]="minTime"
						   [max]="maxTime"
						   [(ngModel)]="selectedStartTime"
						   name="startTime">
					<mat-timepicker-toggle matIconSuffix [for]="startPicker"></mat-timepicker-toggle>
					<mat-timepicker interval="15min" #startPicker></mat-timepicker>
				</div>
			</div>

			<div class="field-group">
				<label class="field-label" for="endTime">End Time</label>
				<div class="input-with-icon">
					<input id="endTime" matInput
						   [matTimepicker]="endPicker"
						   [min]="minTime"
						   [max]="maxTime"
						   [(ngModel)]="selectedEndTime"
						   name="endTime">
					<mat-timepicker-toggle matIconSuffix [for]="endPicker"></mat-timepicker-toggle>
					<mat-timepicker interval="15min" #endPicker></mat-timepicker>
				</div>
			</div>
		</div> <div class="action-row">
		<button mat-flat-button type="button" class="save-btn" (click)="saveMeal()" [disabled]="isSubmitting">
			{{ isEditMode ? 'Update Meal' : 'Save Meal' }}
		</button>
		@if (isEditMode) {
			<button mat-stroked-button type="button" class="delete-btn" (click)="deleteMeal()" [disabled]="isSubmitting">
				Delete Meal
			</button>
		}
	</div>

		@if (showError) { <div class="error-text">Please fill out all the fields</div> }
		@if (backendError) { <div class="error-text">{{ backendError }}</div> }

		<hr>
	</form>
</section>

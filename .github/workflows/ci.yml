#file: noinspection GrazieInspection
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install deps
        working-directory: ./code
        run: npm ci

      - name: Build (browser)
        working-directory: ./code
        run: npm run frontend:build

      - name: Run tests
        working-directory: ./code
        run: npm test --silent

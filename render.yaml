#file: noinspection GrazieInspection
services:
  - type: web
    name: room-food-frontend
    runtime: node
    buildCommand: cd code && NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: cd code && npx serve -s dist/roomFood/browser -l $PORT
    plan: free
    envVars:
      - key: PORT
        value: 3000
  - type: web
    name: room-food-proxy
    runtime: node
    buildCommand: cd proxy && npm ci
    startCommand: cd proxy && npm start
    plan: free
    envVars:
      - key: PORT
        value: 3002
      - key: BACKEND_URL
        value: https://roomfood-backend.black2.cf
      - key: ALLOWED_ORIGINS
        value: https://roomfood.onrender.com
